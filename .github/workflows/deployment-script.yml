name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build \
            -f Projekat/LabSistem.backend/LABsistem.Presentation/Dockerfile \
            -t labsistem-api:latest \
            Projekat/LabSistem.backend
          docker build \
            -f Projekat/LABsistem.Frontend/Dockerfile \
            -t labsistem-frontend:latest \
            Projekat/LABsistem.Frontend

      - name: Save Docker images
        run: |
          docker save labsistem-api:latest -o labsistem-api.tar
          docker save labsistem-frontend:latest -o labsistem-frontend.tar

      - name: Make saved images readable
        run: chmod 644 labsistem-api.tar labsistem-frontend.tar

      - name: Copy images and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "labsistem-api.tar,labsistem-frontend.tar,Projekat/LabSistem.backend/docker-compose.production.yml"
          target: ${{ secrets.APP_DIR }}

      - name: Load images and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}

            docker load -i labsistem-api.tar
            docker load -i labsistem-frontend.tar

            cp Projekat/LabSistem.backend/docker-compose.production.yml docker-compose.prod.yml

            if docker ps --format '{{.Names}}' | grep -Fxq labsistem-api; then
              echo "Existing labsistem-api container detected. Recreating it with the new image."
            else
              echo "No running labsistem-api container detected. Starting the service."
            fi

            if docker ps --format '{{.Names}}' | grep -Fxq labsistem-frontend; then
              echo "Existing labsistem-frontend container detected. Recreating it with the new image."
            else
              echo "No running labsistem-frontend container detected. Starting the service."
            fi

            if docker ps -a --format '{{.Names}}' | grep -Fxq labsistem-db; then
              echo "Existing labsistem-db container detected. Reusing it."
              docker start labsistem-db >/dev/null 2>&1 || true
            else
              echo "No existing labsistem-db container detected. Creating it."
              docker compose -f docker-compose.prod.yml up -d db
            fi

            docker rm -f labsistem-api >/dev/null 2>&1 || true
            docker rm -f labsistem-frontend >/dev/null 2>&1 || true

            docker compose -f docker-compose.prod.yml up -d --no-deps labsistem.api
            docker compose -f docker-compose.prod.yml up -d --no-deps labsistem.frontend

            docker image prune -f
