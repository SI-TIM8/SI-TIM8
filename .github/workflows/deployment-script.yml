name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f Projekat/LabSistem.backend/LABsistem.Presentation/Dockerfile \
            -t labsistem-api:latest \
            Projekat/LabSistem.backend

      - name: Save Docker image
        run: docker save labsistem-api:latest -o labsistem-api.tar

      - name: Copy image and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "labsistem-api.tar,Projekat/LabSistem.backend/docker-compose.production.yml"
          target: ${{ secrets.APP_DIR }}

      - name: Load image and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}

            docker load -i labsistem-api.tar

            cp Projekat/LabSistem.backend/docker-compose.production.yml docker-compose.prod.yml

            docker compose -f docker-compose.production.yml up -d

            docker image prune -f