name: Deploy

on:
  push:
    branches: [ "chore/deployment-and-build-scripts" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build \
            -f Projekat/LabSistem.backend/LABsistem.Presentation/Dockerfile \
            -t labsistem-api:latest \
            Projekat/LabSistem.backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -f Projekat/LABsistem.Frontend/Dockerfile \
            -t labsistem-frontend:latest \
            Projekat/LABsistem.Frontend

      - name: Save Docker images
        run: |
          docker save labsistem-api:latest -o labsistem-api.tar
          docker save labsistem-frontend:latest -o labsistem-frontend.tar
          chmod 644 labsistem-api.tar
          chmod 644 labsistem-frontend.tar
          ls -l labsistem-api.tar
          ls -l labsistem-frontend.tar

      - name: Copy images and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "labsistem-api.tar,labsistem-frontend.tar,Projekat/LabSistem.backend/docker-compose.production.yml"
          target: ${{ secrets.APP_DIR }}
          overwrite: true

      - name: Load images and restart containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}

            docker load -i labsistem-api.tar
            docker load -i labsistem-frontend.tar
            docker pull postgres:16

            docker compose -f Projekat/LabSistem.backend/docker-compose.production.yml up -d

            rm -f labsistem-api.tar labsistem-frontend.tar

            docker image prune -f
