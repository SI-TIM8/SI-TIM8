services:
  db:
    image: postgres:16
    container_name: labsistem-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - labsistem_pgdata:/var/lib/postgresql/data
    networks:
      - labsistem-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  labsistem.api:
    image: labsistem-api:latest
    container_name: labsistem-api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__Default: ${CONNECTION_STRING}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
      TZ: Europe/Sarajevo
    ports:
      - "8080:8080"
    networks:
      - labsistem-network
    depends_on:
      db:
        condition: service_healthy

  labsistem.frontend:
    image: labsistem-frontend:latest
    container_name: labsistem-frontend
    ports:
      - "3000:80"
    networks:
      - labsistem-network
    depends_on:
      labsistem.api:
        condition: service_started

volumes:
  labsistem_pgdata:
    external: true
    name: labsistembackend_labsistem_pgdata

networks:
  labsistem-network:
    external: true
    name: labsistem-network
