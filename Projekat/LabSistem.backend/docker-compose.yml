version: '3.8'

services:
  db:
    image: postgres:16
    container_name: labsistem-db
    environment:
      POSTGRES_DB: labsistem
      POSTGRES_USER: labsistem
      POSTGRES_PASSWORD: labsistem
    ports:
      - "5432:5432"
    volumes:
      - labsistem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labsistem -d labsistem"]
      interval: 5s
      timeout: 5s
      retries: 20

  labsistem.api:
    build:
      context: .
      dockerfile: LABsistem.Presentation/Dockerfile
    container_name: labsistem-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=labsistem;Username=labsistem;Password=labsistem
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  labsistem_pgdata: